<form action="{:sysuri()}" class='layui-form layui-card' data-auto="true" method="post">

    <div class="padding-row-10 padding-top-10 padding-bottom-0" id="smsConfig">
        <table class="layui-table margin-0">
            <thead>
            <tr>
                <th class="text-center" style="width: 70px">通道编码</th>
                <th style="width: 120px">通道名称</th>
                <th class="text-center" style="width: 90px">模版编号</th>
                <th>
                   <div class="flex flex-justify-space-between">
                       <div>
                           模版内容
                           <span class="margin-left-10 color-red font-w1">仅做示例使用不起实际作用</span>
                       </div>
                       <span class="pointer color-blue margin-left-10 font-w1 font-s12 nowrap" @click="batchRefresh">批量刷新</span>
                   </div>
                </th>
<!--                <th width="30" class="text-center">状态</th>-->
            </tr>
            </thead>
            <tbody>
            <tr v-for="(item,k) in scenesData" :key="k">
                <td class="text-center">{{k}}</td>
                <td class="padding-row-10">
                    <span v-if="item.type == 'instant'" class="layui-badge think-bg-green" data-tips-text="即时发送短信">即</span>
                    <span v-if="item.type == 'task'" class="layui-badge think-bg-orig" data-tips-text="任务发送短信">任</span>
                    <span>{{item.name}}</span>
                </td>
                <td class="padding-0 layui-bg-gray">
                    <input class="layui-input border-0 text-center padding-0" style="background-color: transparent" v-model="item.template" @blur="getTemp(item)" placeholder="DX 开头的模版编号">
                </td>
                <td style="padding: 3px">
                    <div v-if="item.tempLogin"  class="color-desc padding-left-10">
                        <span class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop"></span>
                        <span class="font-s12 margin-left-10">模版获取中..</span>
                    </div>
                    <div v-else style="line-height: 15px;padding: 3px" >
                        <span v-if="item.content.length > 0" class="color-desc">{{item.content}}</span>
                        <span v-else class="layui-font-gray">== 无模版内容 ==</span>
                    </div>
                </td>
            </tr>

            </tbody>
        </table>
        <textarea class="layui-hide" name="config">{{scenesData}}</textarea>
    </div>

    <div class="hr-line-dashed"></div>

    <div class="layui-form-item text-center ta-mt-20">
        <button class="layui-btn" type="submit">保存配置</button>
        <button class="layui-btn layui-btn-danger" type='button' data-confirm="确定要取消修改吗？" data-close>取消修改</button>
    </div>
</form>
<label class="layui-hide">
    <textarea class="layui-textarea" id="scenesData">{$scenes|default='[]'|raw}</textarea>
</label>
<script>
    require(['vue','angular'], function (vue) {
        var scenesData = angular.fromJson($('#scenesData').val() || '{}') || {};

        var app = new vue({
            el: '#smsConfig',
            data: {
                scenesData
            },
            methods: {
                // 搜索刷新数据
                getTemp(item){
                    let that = this;
                    if(item.template.length <= 0) return false;
                    that.$set(item,'tempLogin',true)
                    $.form.load("{:url('getTemp')}",item,'post',function (res) {
                        let {template_params} = res.data;
                        that.$set(item,'tempLogin',false)
                        if (res.code){
                            if(!template_params){
                                $.msg.alert('模版获取失败')
                            }else{
                                item.content = template_params;
                                return false
                            }
                        }
                    },false)
                },
                batchRefresh(){
                    let that = this, {scenesData} = this;
                    // 清空所有模版数据并设置为 加载中状态
                    Object.keys(scenesData).filter(i => scenesData[i].template.length > 0).forEach(key => {
                        that.$set(scenesData[key],'tempLogin',true);
                    })
                    $.form.load("{:url('getTempList')}",{},'post',function (res) {
                        const list = res.data;
                        if (res.code){
                            if(list.length <= 0){
                                $.msg.tips('未获取到模版数据')
                            }else{
                                Object.keys(scenesData).filter(i => scenesData[i].template.length > 0).forEach(key => {
                                    let  scenes = scenesData[key]
                                    that.$set(scenesData[key],'tempLogin',false);
                                    let info = list.find(i => i.code === scenes.template)
                                    if(info.code){
                                        that.$set(scenesData[key],'content',info.template_params);
                                    }else{
                                        that.$set(scenesData[key],'content','');
                                    }
                                })
                            }
                            return false
                        } else {
                            Object.keys(scenesData).filter(i => scenesData[i].template.length > 0).forEach(key => {
                               that.$set(scenesData[key],'tempLogin',false);
                            })
                        }
                    },false)

                }
            }
        });
    });
</script>
